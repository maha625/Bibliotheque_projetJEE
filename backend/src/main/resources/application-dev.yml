spring:
  datasource:
    url: jdbc:mysql://localhost:3307/projet_jee?createDatabaseIfNotExist=true
    username: root
    password: "1234"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  swagger-ui:
    # C'est ici que tu changes l'URL d'accès à l'interface
    path: /swagger
  api-docs:
    # C'est ici que tu changes l'URL du JSON brut (si besoin)
    path: /v3/api-docs